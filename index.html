<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Местим всичко - Екип</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #1a3c5a; --accent-color: #e67e22; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Sidebar Style - Уеднаквен с Админ панела */
        .sidebar { height: 100vh; background: var(--primary-color); color: white; position: fixed; width: 250px; transition: 0.3s; z-index: 1000; }
        .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 15px 25px; display: block; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .sidebar a:hover, .sidebar a.active { background: #244d73; color: white; border-left: 4px solid var(--accent-color); }
        
        .content { margin-left: 250px; padding: 20px; transition: 0.3s; }
        
        @media (max-width: 768px) {
            .sidebar { margin-left: -250px; }
            .sidebar.active { margin-left: 0; }
            .content { margin-left: 0; }
        }

        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-primary { background: var(--primary-color); border: none; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
        
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 3000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner-border text-primary"></div></div>

<!-- LOGIN SCREEN (Показва се ако няма сесия) -->
<div id="loginOverlay" style="display:none;">
    <div class="card p-4 shadow-lg text-center" style="max-width: 350px; width: 90%;">
        <i class="fas fa-truck-loading fa-3x text-primary mb-3"></i>
        <h4 class="fw-bold">Екип - Вход</h4>
        <input type="email" id="logEmail" class="form-control mb-2" placeholder="Имейл">
        <input type="password" id="logPass" class="form-control mb-3" placeholder="Парола">
        <button class="btn btn-primary w-100 py-2" onclick="login()">Влез</button>
        <div id="loginError" class="text-danger mt-2 small"></div>
    </div>
</div>

<div class="d-flex">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <div class="p-4 text-center">
            <h5 class="fw-bold mb-0">МЕСТИМ ВСИЧКО</h5>
            <small id="userName" class="text-muted"></small>
        </div>
        <a onclick="showSection('dashboard')" id="nav-dashboard" class="active"><i class="fas fa-home me-2"></i> Табло</a>
        <a onclick="showSection('orders')" id="nav-orders"><i class="fas fa-list me-2"></i> Моите Поръчки</a>
        <a onclick="showSection('money')" id="nav-money"><i class="fas fa-wallet me-2"></i> Моите Пари</a>
        <a onclick="showSection('chat')" id="nav-chat"><i class="fas fa-comments me-2"></i> Чат</a>
        <a onclick="logout()" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Изход</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="content w-100">
        <button class="btn btn-sm btn-dark d-md-none mb-3" onclick="toggleSidebar()"><i class="fas fa-bars"></i> Меню</button>

        <!-- SECTION: DASHBOARD (CLOCK-IN) -->
        <section id="section-dashboard">
            <h2 class="fw-bold">Дневен статус</h2>
            <div class="card p-4 mt-3">
                <div id="clockInContainer">
                    <p class="text-muted">Системата проверява за активни задачи за днес...</p>
                    <button id="btnClockIn" class="btn btn-success btn-lg w-100 py-3 shadow" style="display:none;" onclick="handleClockIn()">
                        <i class="fas fa-play me-2"></i> ЗАПОЧНИ РАБОТА (Clock-In)
                    </button>
                    <div id="activeJob" class="alert alert-success mt-2" style="display:none;">
                        <i class="fas fa-check-circle me-2"></i> В момента работите по: <strong id="currentOrderName">-</strong>
                        <button class="btn btn-danger btn-sm d-block mt-3" onclick="handleClockOut()">Край на работа</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECTION: ORDERS -->
        <section id="section-orders" style="display:none;">
            <h2 class="fw-bold">Моите Поръчки</h2>
            <div id="orderList" class="mt-3"></div>
        </section>

        <!-- SECTION: MONEY -->
        <section id="section-money" style="display:none;">
            <h2 class="fw-bold">Моите Финанси</h2>
            <div class="card p-3 mt-3">
                <h5 class="text-muted">Към плащане: <span id="totalUnpaid" class="text-success fw-bold">0.00 €</span></h5>
                <hr>
                <div id="financeDetails" class="small">
                    <!-- Тук ще се изреждат бонуси и глоби по дни -->
                </div>
            </div>
        </section>
        
        <!-- SECTION: CHAT -->
        <section id="section-chat" style="display:none;">
            <h2 class="fw-bold">Чат с Админ</h2>
            <div class="card p-3 mt-3" style="height: 400px; display: flex; flex-direction: column;">
                <div id="chatMessages" style="flex-grow: 1; overflow-y: auto; padding: 10px; background: #f8f9fa;" class="mb-2 rounded"></div>
                <div class="input-group">
                    <input type="text" id="chatInput" class="form-control" placeholder="Напиши съобщение...">
                    <button class="btn btn-primary" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwA-q2ce8R0tB3EusmgR8Uy_M0W2dfAQLrVfb96CDLg8-56ZvNU9LMLtsExEgZ_YfNRpw/exec";
    let currentUser = JSON.parse(localStorage.getItem('erp_user'));
    let lastData = null;

    // ПЪРВОНАЧАЛНО ЗАРЕЖДАНЕ (Фикс за Refresh)
    window.onload = function() {
        if (!currentUser) {
            document.getElementById('loginOverlay').style.display = 'flex';
        } else {
            document.getElementById('userName').innerText = currentUser.Name;
            fetchData();
        }
    };

    async function login() {
        const email = document.getElementById('logEmail').value;
        const pass = document.getElementById('logPass').value;
        toggleLoader(true);
        try {
            const res = await fetch(`${API_URL}?email=${email}&pass=${pass}`);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            
            localStorage.setItem('erp_user', JSON.stringify(data.user));
            currentUser = data.user;
            location.reload();
        } catch (e) {
            document.getElementById('loginError').innerText = "Грешни данни!";
        }
        toggleLoader(false);
    }

    async function fetchData() {
        toggleLoader(true);
        try {
            const res = await fetch(`${API_URL}?email=${currentUser.Email}&pass=${currentUser.Password}`);
            const data = await res.json();
            lastData = data;
            renderUI(data);
        } catch (e) { console.error(e); }
        toggleLoader(false);
    }

    function renderUI(data) {
        // Логика за Clock-In
        const myAssignments = data.assignments.filter(a => String(a.Emp_ID) === String(currentUser.ID_Emp));
        const today = new Date().toISOString().split('T')[0];
        const todayJobs = data.orders.filter(o => myAssignments.some(a => String(a.Order_ID) === String(o.ID_Order)) && o.Date === today);

        const activeWork = data.workLogs.find(l => String(l.Emp_ID) === String(currentUser.ID_Emp) && !l.Clock_Out);

        if (activeWork) {
            document.getElementById('btnClockIn').style.display = 'none';
            document.getElementById('activeJob').style.display = 'block';
            const order = data.orders.find(o => String(o.ID_Order) === String(activeWork.Order_ID));
            document.getElementById('currentOrderName').innerText = order ? order.ClientName : "Поръчка";
        } else if (todayJobs.length > 0) {
            document.getElementById('btnClockIn').style.display = 'block';
            document.getElementById('activeJob').style.display = 'none';
            // Запазваме ID на първата поръчка за днес, за да знаем за коя правим Clock-In
            document.getElementById('btnClockIn').dataset.orderId = todayJobs[0].ID_Order;
        }

        // Логика за Пари
        document.getElementById('totalUnpaid').innerText = currentUser.Total_Unpaid_Eur + " €";
        const myLogs = data.workLogs.filter(l => String(l.Emp_ID) === String(currentUser.ID_Emp) && l.Payment_Status === "Unpaid" && l.Clock_Out);
        document.getElementById('financeDetails').innerHTML = myLogs.map(l => `
            <div class="mb-2 border-bottom pb-1">
                <strong>${l.Clock_In.split(' ')[0]}</strong>: ${l.Total_Minutes} мин. | База: ${l.Base_Pay}€<br>
                <span class="text-success">+Бонуси: ${Number(l.Driver_Bonus)+Number(l.Coord_Bonus)+Number(l.Extra_Bonus)}€</span> | 
                <span class="text-danger">-Глоба: ${l.Fine_Penalty}€</span>
            </div>
        `).join('') || "Няма записи за плащане.";
    }

    // GPS ФИКС: Взема локация само веднъж при действие
    function getGPS() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) return resolve("No GPS");
            navigator.geolocation.getCurrentPosition(
                (p) => resolve(`${p.coords.latitude},${p.coords.longitude}`),
                () => resolve("Denied"),
                { enableHighAccuracy: true, timeout: 5000 }
            );
        });
    }

    async function handleClockIn() {
        const orderId = document.getElementById('btnClockIn').dataset.orderId;
        const coords = await getGPS();
        toggleLoader(true);
        // Изпращане към API (трябва да добавиш логика в GAS за запис в WorkLogs)
        alert("Clock-In успешно! Координати: " + coords);
        toggleLoader(false);
    }

    function showSection(id) {
        document.querySelectorAll('section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
        document.getElementById('section-' + id).style.display = 'block';
        document.getElementById('nav-' + id).classList.add('active');
        if (window.innerWidth < 768) toggleSidebar();
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function logout() { localStorage.removeItem('erp_user'); location.reload(); }
</script>
</body>
</html>
