<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Местим всичко - Екип Про</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; margin: 0; }
        h1, h2, h3, h4, h5, .sidebar, .fw-bold, .btn { font-family: 'Montserrat', sans-serif; }
        .sidebar { height: 100vh; background: #1a3c5a; color: white; position: fixed; width: 240px; z-index: 1000; }
        .sidebar a { color: white; text-decoration: none; padding: 15px 25px; display: block; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar a:hover, .sidebar a.active { background: #244d73; }
        .content { margin-left: 240px; padding: 25px; min-height: 100vh; }
        #calendar { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 85vh; }
        .fc-event { cursor: pointer !important; font-size: 0.8rem; }
        #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a3c5a; position: fixed; width: 100%; top:0; left:0; z-index: 9999; }
        .stats-card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span { display: none; } .content { margin-left: 70px; } }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="text-center p-5 shadow-lg rounded-4 bg-white" style="max-width: 400px; width: 90%;">
            <i class="fas fa-user-shield fa-3x text-primary mb-3"></i>
            <h3 class="fw-bold">Вход Екип</h3>
            <input type="email" id="logEmail" class="form-control mb-3 py-2 text-center" placeholder="Имейл">
            <input type="password" id="logPass" class="form-control mb-4 py-2 text-center" placeholder="Парола">
            <button class="btn btn-primary w-100 py-2 fw-bold" onclick="tryLogin()">ВЛИЗАНЕ</button>
        </div>
    </div>

    <div id="appScreen" style="display:none;">
        <div class="sidebar">
            <div class="p-4 text-center"><h5>ЕКИП</h5><small id="uName" class="badge bg-primary"></small></div>
            <a onclick="showPage('calendar')"><i class="fas fa-calendar-alt"></i> <span>График</span></a>
            <a onclick="showPage('stats')"><i class="fas fa-euro-sign"></i> <span>Моите пари</span></a>
            <a onclick="showPage('chat')"><i class="fas fa-comments"></i> <span>Чат</span></a>
            <a onclick="location.reload()" class="text-danger mt-5"><i class="fas fa-sign-out-alt"></i> <span>Изход</span></a>
        </div>

        <div class="content">
            <section id="page-calendar">
                <div class="d-flex justify-content-between mb-4"><h2>Моят График</h2><button class="btn btn-primary rounded-pill px-4" onclick="handleClockIn()">CLOCK IN ДНЕС</button></div>
                <div id="calendar"></div>
            </section>

            <section id="page-stats" style="display:none;">
                <h2 class="mb-4">Финансова справка</h2>
                <div class="row g-3 mb-4">
                    <div class="col-6"><div class="card p-3 text-center stats-card"><h6>Изработени</h6><h3 id="stHours">0</h3><small>часа</small></div></div>
                    <div class="col-6"><div class="card p-3 text-center stats-card text-success"><h6>За плащане</h6><h3 id="stUnpaid">0€</h3></div></div>
                </div>
                <div id="historyList"></div>
            </section>

            <section id="page-chat" style="display:none;">
                <div id="chatBox" class="card p-3 mb-3" style="height: 70vh; overflow-y: auto;"></div>
                <div class="input-group"><input type="text" id="chatMsg" class="form-control" placeholder="Съобщение..."><button class="btn btn-primary" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button></div>
            </section>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal fade" id="orderModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content p-4 rounded-4 shadow" id="modalDetails"></div></div></div>
    <div class="modal fade" id="checkModal" data-bs-backdrop="static" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content p-4 rounded-4 shadow">
        <h4 class="fw-bold mb-4">Край на работа</h4>
        <label>Имаше ли униформа?</label><select id="q1" class="form-select mb-3"><option>Да</option><option>Не</option></select>
        <label>Работа с екипа?</label><select id="q2" class="form-select mb-4"><option>Лека</option><option>Нормална</option><option>Трудна</option></select>
        <button class="btn btn-success w-100 py-3 rounded-pill fw-bold" onclick="finishWork()">ИЗПРАТИ И ПРИКЛЮЧИ</button>
    </div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/bg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwA-q2ce8R0tB3EusmgR8Uy_M0W2dfAQLrVfb96CDLg8-56ZvNU9LMLtsExEgZ_YfNRpw/exec";
        const SERVICE_COLORS = { "Преместване": "#2ecc71", "Работа на екип": "#3498db", "Изхвърляне строителни": "#e67e22", "Изхвърляне мебели": "#95a5a6", "Транспорт": "#1abc9c", "Оглед": "#f1c40f", "Монтаж": "#e74c3c" };
        let appData = {}; let calendar;

        async function tryLogin() {
            const email = document.getElementById('logEmail').value.trim();
            const pass = document.getElementById('logPass').value.trim();
            try {
                const resp = await fetch(`${API_URL}?email=${email}&pass=${pass}&action=getEmployeeOrders`);
                const data = await resp.json();
                if(data.error) throw new Error();
                appData = data;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('uName').innerText = data.user.Name;
                renderAll();
            } catch(e) { Swal.fire('Грешка', 'Невалидни данни!', 'error'); }
        }

        function renderAll() {
            const el = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(el, {
                initialView: 'dayGridMonth', locale: 'bg',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                events: appData.orders.map(o => ({
                    title: `${o.Time_Start_Plan} | ${o.Service}`,
                    start: `${o.Date}T${o.Time_Start_Plan}`,
                    end: o.Time_End_Plan ? `${o.Date}T${o.Time_End_Plan}` : null,
                    color: SERVICE_COLORS[o.Service] || '#1a3c5a',
                    extendedProps: o
                })),
                eventClick: (i) => showOrder(i.event.extendedProps)
            });
            calendar.render();

            document.getElementById('stHours').innerText = appData.stats.totalHours;
            document.getElementById('stUnpaid').innerText = appData.stats.unpaidEur + "€";
            document.getElementById('historyList').innerHTML = appData.stats.history.map(h => `<div class="card p-2 mb-2 small d-flex justify-content-between flex-row"><span>${h.Date || h.Clock_In}</span><b>${h.Total_Pay_Eur}€</b></div>`).join('');
        }

        function showOrder(o) {
            document.getElementById('modalDetails').innerHTML = `
                <h4 class="fw-bold" style="color:${SERVICE_COLORS[o.Service]}">${o.Service}</h4>
                <p><b>Клиент:</b> ${o.Client_ID}<br><b>Тел:</b> <a href="tel:${o.Phone}">${o.Phone}</a></p>
                <p><b>Адрес:</b> ${o.Address_Start} &rarr; ${o.Address_End}</p>
                <p><b>Екип:</b> ${o.TeamMembers}</p>
                <div class="d-grid gap-2 mt-3">
                    <button class="btn btn-primary py-3 rounded-pill fw-bold" onclick="clockIn('${o.ID_Order}')">СТАРТ</button>
                    <button class="btn btn-danger py-3 rounded-pill fw-bold" onclick="openCheck('${o.ID_Order}')">КРАЙ</button>
                </div>
            `;
            new bootstrap.Modal(document.getElementById('orderModal')).show();
        }

        function handleClockIn() {
            const today = new Date().toISOString().split('T')[0];
            const todayOrder = appData.orders.find(o => o.Date === today);
            if(!todayOrder) return Swal.fire('Няма поръчка', 'Днес нямате назначена работа в графика.', 'info');
            clockIn(todayOrder.ID_Order);
        }

        async function clockIn(id) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const gps = pos.coords.latitude + "," + pos.coords.longitude;
                await fetch(API_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:"clockIn", OrderId:id, EmpId:appData.user.ID_Emp, GPS:gps})});
                Swal.fire('Успех', 'Работата започна!', 'success');
            }, () => Swal.fire('GPS?', 'Моля, пуснете локацията!', 'error'));
        }

        function openCheck(id) { bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide(); document.getElementById('curId').value = id; new bootstrap.Modal(document.getElementById('checkModal')).show(); }

        async function finishWork() {
            const d = { action:"clockOut", OrderId:document.getElementById('curId').value, EmpId:appData.user.ID_Emp, uniform:document.getElementById('q1').value, teamWork:document.getElementById('q2').value };
            await fetch(API_URL, {method:'POST', mode:'no-cors', body:JSON.stringify(d)});
            location.reload();
        }

        function showPage(p) { document.querySelectorAll('section').forEach(s => s.style.display='none'); document.getElementById('page-'+p).style.display='block'; if(p==='calendar') calendar.updateSize(); }
    </script>
</body>
</html>
