<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Местим Всичко - Служител</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #e67e22; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        
        /* Sidebar Style */
        #sidebar { min-width: 250px; max-width: 250px; background: var(--primary-color); color: #fff; min-height: 100vh; transition: all 0.3s; }
        #sidebar .nav-link { color: rgba(255,255,255,0.8); border-radius: 5px; margin: 5px 10px; }
        #sidebar .nav-link.active { background: var(--accent-color); color: white; }
        
        /* Mobile adjustment */
        @media (max-width: 768px) {
            #sidebar { margin-left: -250px; position: fixed; z-index: 1000; }
            #sidebar.active { margin-left: 0; }
        }

        #main-content { width: 100%; padding: 20px; }
        .clock-in-card { border-left: 5px solid #27ae60; background: white; }
    </style>
</head>
<body>

<div class="d-flex">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="p-4 text-center">
            <h4>МЕСТИМ ВСИЧКО</h4>
            <small id="userDisplayName">Зареждане...</small>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="#" class="nav-link active" onclick="showSection('dashboard')"><i class="fas fa-home me-2"></i> Табло</a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="showSection('orders')"><i class="fas fa-truck me-2"></i> Моите Поръчки</a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="showSection('money')"><i class="fas fa-wallet me-2"></i> Пари (Финанси)</a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="showSection('chat')"><i class="fas fa-comments me-2"></i> Чат</a></li>
            <li class="nav-item mt-5"><a href="#" class="nav-link text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Изход</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div id="main-content">
        <button class="btn btn-primary d-md-none mb-3" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

        <!-- Dashboard Section (Clock-In) -->
        <section id="dashboard-section">
            <div class="container">
                <div class="card clock-in-card shadow-sm p-4 mb-4">
                    <h3>Дневен статус</h3>
                    <p class="text-muted">Проверка за активни поръчки за днес...</p>
                    <div id="clockInArea">
                        <button id="btnClockIn" class="btn btn-success btn-lg w-100" onclick="handleClockIn()" style="display:none;">
                            <i class="fas fa-play me-2"></i> CLOCK-IN (Започни работа)
                        </button>
                        <div id="activeWork" class="alert alert-info mt-3" style="display:none;">
                            В момента работите по поръчка: <strong id="currentOrderName">-</strong>
                            <button class="btn btn-danger btn-sm ms-3" onclick="handleClockOut()">Край на работа</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Секции за Orders, Money и Chat (скрити първоначално) -->
        <section id="orders-section" style="display:none;"><h2>Моите Поръчки</h2><div id="ordersList"></div></section>
        <section id="money-section" style="display:none;"><h2>Финанси</h2><div id="financeStats"></div></section>
        <section id="chat-section" style="display:none;"><h2>Чат с Екипа</h2><div id="chatBox"></div></section>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwA-q2ce8R0tB3EusmgR8Uy_M0W2dfAQLrVfb96CDLg8-56ZvNU9LMLtsExEgZ_YfNRpw/exec";
    let currentUser = JSON.parse(localStorage.getItem('erp_user'));

    // 1. Проверка при зареждане (Fix Refresh)
    window.onload = function() {
        if (!currentUser) {
            window.location.href = "login.html"; // Пренасочи към вход ако няма сесия
        } else {
            document.getElementById('userDisplayName').innerText = currentUser.Name;
            checkTodayAssignment();
        }
    };

    function showSection(sectionId) {
        ['dashboard', 'orders', 'money', 'chat'].forEach(s => {
            document.getElementById(s + '-section').style.display = (s === sectionId) ? 'block' : 'none';
        });
        // Актуализиране на активен клас в менюто
    }

    // 2. Логика за Clock-In (Общ бутон)
    async function checkTodayAssignment() {
        // Тук викаме API-то да провери Assignments за Emp_ID и днешна дата
        // Ако има поръчка -> показваме бутона Clock-In
        document.getElementById('btnClockIn').style.display = 'block'; 
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    function logout() {
        localStorage.removeItem('erp_user');
        window.location.reload();
    }
</script>
</body>
</html>
